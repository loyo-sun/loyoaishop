<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f7f4ed" />
    <meta name="robots" content="index,follow" />
    <meta
      name="description"
      content="Loyo AI Shop 提供 Gemini Pro、OpenAI Codex 手机接码等 AI 工具卡密与充值服务，支持分类筛选、价格排序和自动发货。"
    />
    <meta
      name="keywords"
      content="Loyo AI Shop, Gemini Pro, OpenAI Codex, AI 工具, 卡密, 自动发货, 接码, 充值"
    />
    <meta name="author" content="Loyo AI Shop" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="zh_CN" />
    <meta property="og:site_name" content="Loyo AI Shop" />
    <meta property="og:title" content="Loyo AI Shop - AI 工具卡密与充值服务" />
    <meta
      property="og:description"
      content="精选 Gemini Pro、OpenAI Codex 等 AI 工具服务，支持在线下单与自动发货。"
    />
    <meta property="og:url" content="https://loyoaishop.vercel.app/" />
    <meta property="og:image" content="https://qn.ldxp.cn/54/16c9f45aa6adedd9537e76711bf552.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Loyo AI Shop - AI 工具卡密与充值服务" />
    <meta
      name="twitter:description"
      content="精选 Gemini Pro、OpenAI Codex 等 AI 工具服务，支持在线下单与自动发货。"
    />
    <meta name="twitter:image" content="https://qn.ldxp.cn/54/16c9f45aa6adedd9537e76711bf552.png" />
    <link rel="canonical" href="https://loyoaishop.vercel.app/" />
    <title>Loyo AI Shop - AI 工具卡密与充值服务</title>
    <link rel="preconnect" href="https://pay.ldxp.cn" />
    <link rel="preconnect" href="https://qn.ldxp.cn" />
    <link rel="stylesheet" href="./styles.css" />
    <script id="structuredData" type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "Loyo AI Shop",
        "url": "https://loyoaishop.vercel.app/",
        "description": "Gemini Pro、OpenAI Codex 等 AI 工具卡密与充值服务小店。",
        "image": "https://qn.ldxp.cn/54/16c9f45aa6adedd9537e76711bf552.png",
        "sameAs": ["https://github.com/loyo-sun/loyoaishop"]
      }
    </script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="#top" aria-label="Loyo AI Shop 首页">
        <span class="brand-mark">L</span>
        <span class="brand-text">Loyo AI Shop</span>
      </a>
      <nav class="nav" aria-label="页面导航">
        <a href="#products">商品</a>
        <a href="#support">售后</a>
        <button class="contact-nav-button" id="openContact" type="button">联系我</button>
      </nav>
    </header>

    <main id="top">
      <section class="section products-section" id="products" aria-labelledby="products-title">
        <div class="section-heading">
          <div>
            <p class="section-kicker">Products</p>
            <h2 id="products-title">当前商品</h2>
          </div>
          <div class="toolbar" aria-label="商品筛选和排序">
            <div class="filter-group" id="categoryFilters" aria-label="商品分类筛选"></div>
            <label class="sort-control" for="priceSort">
              <span>价格</span>
              <select id="priceSort" aria-label="按价格排序">
                <option value="default">默认排序</option>
                <option value="asc">从低到高</option>
                <option value="desc">从高到低</option>
              </select>
            </label>
          </div>
        </div>

        <div class="product-grid" id="productGrid" aria-live="polite"></div>
      </section>

      <section class="section support" id="support" aria-labelledby="support-title">
        <div>
          <p class="section-kicker">Support</p>
          <h2 id="support-title">购买与售后</h2>
        </div>
        <div class="support-grid">
          <div>
            <h3>自动发货</h3>
            <p>商品下单后自动交付卡密或充值信息。</p>
          </div>
          <div>
            <h3>购买前确认</h3>
            <p>请在商品详情页阅读使用范围、充值教程和售后条款后再下单。</p>
          </div>
        </div>
      </section>
    </main>

    <div class="modal-backdrop" id="contactModal" hidden>
      <section
        class="contact-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="contactModalTitle"
      >
        <button class="modal-close" id="closeContact" type="button" aria-label="关闭联系二维码">×</button>
        <p class="section-kicker">Contact</p>
        <h2 id="contactModalTitle">联系我</h2>
        <img class="contact-qr-large" src="./qrcode.jpg" alt="联系我二维码" />
        <p class="contact-hint">扫码添加微信咨询商品与售后。</p>
      </section>
    </div>

    <footer class="site-footer">
      <span>© <span id="year"></span> Loyo AI Shop</span>
    </footer>

    <script src="./script.js"></script>
  </body>
</html>
